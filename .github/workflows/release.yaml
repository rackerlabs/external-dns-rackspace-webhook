name: release

on:
  push:
    tags:
      - "*" # run on any tag push

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # needed for goreleaser (tags)

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  chart:
    runs-on: ubuntu-latest
    needs: [container]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push Helm chart
        run: |
          PKG_VER=${GITHUB_REF_NAME#v}

          # update Chart.yaml with tag version
          yq -i ".version = \"${PKG_VER}\"" charts/Chart.yaml

          # package chart
          helm package -u -d ${{ github.workspace }} charts

          # push chart to ghcr.io
          helm push ${{ github.workspace }}/external-dns-rackspace-${PKG_VER}.tgz \
            oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts
