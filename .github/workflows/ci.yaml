name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read
  checks: write
  id-token: write

jobs:
  go-mod:
    name: Verify Go modules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod
          git diff --exit-code go.sum

  test:
    name: Run tests
    if: github.event.pull_request.head.repo.fork != true # only run on non-forks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test
        env:
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          RAX_API_KEY: ${{ secrets.RAX_API_KEY }}

  build:
    name: Build (snapshot)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Install cosign
        if: github.event.pull_request.head.repo.fork != true
        uses: sigstore/cosign-installer@v4.1.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Run GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish --snapshot ${{ github.event.pull_request.head.repo.fork == true && '--skip=sign' || '' }}

  chart:
    name: Lint Helm charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0 # full history for chart-testing

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v4.1.4

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.x"
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Detect changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch "${{ github.event.repository.default_branch }}")
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --check-version-increment=false --target-branch "${{ github.event.repository.default_branch }}"
